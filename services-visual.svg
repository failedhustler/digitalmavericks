<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 400" width="480" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fbff"/>
      <stop offset="100%" style="stop-color:#eef4ff"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f5f9ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(26,107,240,0.12)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="400" fill="url(#bgGrad)" rx="24"/>

  <!-- Card 1 — Social Media Marketing -->
  <g filter="url(#shadow)">
    <rect x="24" y="24" width="204" height="90" rx="16" fill="url(#cardGrad)" stroke="#E2ECF8" stroke-width="1"/>
  </g>
  <rect x="40" y="42" width="44" height="44" rx="12" fill="#EBF2FF"/>
  <text x="62" y="71" text-anchor="middle" font-size="22">📱</text>
  <text x="100" y="65" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#1A2540">Social Media</text>
  <text x="100" y="82" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748B">Marketing</text>
  <rect x="100" y="92" width="50" height="3" rx="2" fill="#EBF2FF"/>

  <!-- Card 2 — SEO -->
  <g filter="url(#shadow)">
    <rect x="252" y="24" width="204" height="90" rx="16" fill="url(#cardGrad)" stroke="#E2ECF8" stroke-width="1"/>
  </g>
  <rect x="268" y="42" width="44" height="44" rx="12" fill="#EBF2FF"/>
  <text x="290" y="71" text-anchor="middle" font-size="22">🔍</text>
  <text x="328" y="65" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#1A2540">SEO</text>
  <text x="328" y="82" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748B">Optimization</text>
  <rect x="328" y="92" width="50" height="3" rx="2" fill="#EBF2FF"/>

  <!-- Card 3 — Website Development -->
  <g filter="url(#shadow)">
    <rect x="24" y="132" width="204" height="90" rx="16" fill="url(#cardGrad)" stroke="#E2ECF8" stroke-width="1"/>
  </g>
  <rect x="40" y="150" width="44" height="44" rx="12" fill="#EBF2FF"/>
  <text x="62" y="179" text-anchor="middle" font-size="22">💻</text>
  <text x="100" y="173" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#1A2540">Website</text>
  <text x="100" y="190" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748B">Development</text>
  <rect x="100" y="200" width="50" height="3" rx="2" fill="#EBF2FF"/>

  <!-- Card 4 — Lead Generation -->
  <g filter="url(#shadow)">
    <rect x="252" y="132" width="204" height="90" rx="16" fill="url(#cardGrad)" stroke="#E2ECF8" stroke-width="1"/>
  </g>
  <rect x="268" y="150" width="44" height="44" rx="12" fill="#EBF2FF"/>
  <text x="290" y="179" text-anchor="middle" font-size="22">🎯</text>
  <text x="328" y="173" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#1A2540">Lead</text>
  <text x="328" y="190" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748B">Generation</text>
  <rect x="328" y="200" width="50" height="3" rx="2" fill="#EBF2FF"/>

  <!-- Card 5 — Public Relations (centered) -->
  <g filter="url(#shadow)">
    <rect x="138" y="240" width="204" height="90" rx="16" fill="url(#cardGrad)" stroke="#E2ECF8" stroke-width="1"/>
  </g>
  <rect x="154" y="258" width="44" height="44" rx="12" fill="#EBF2FF"/>
  <text x="176" y="287" text-anchor="middle" font-size="22">📣</text>
  <text x="214" y="281" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#1A2540">Public</text>
  <text x="214" y="298" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748B">Relations</text>
  <rect x="214" y="308" width="50" height="3" rx="2" fill="#EBF2FF"/>

</svg>
